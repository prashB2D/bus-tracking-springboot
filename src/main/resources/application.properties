# Server Configuration
server.address=0.0.0.0
server.port=8080

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/bus_tracking
spring.datasource.username=root
spring.datasource.password=MySystem@23
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=we have put the key 
jwt.expiration=86400000

# CORS
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# WebSocket Debugging (Mobile optimized)
logging.level.org.springframework.web.socket=DEBUG
logging.level.org.springframework.messaging.simp=DEBUG
logging.level.org.springframework.web.socket.sockjs=DEBUG
logging.level.org.springframework.web.socket.simp.stomp=TRACE
logging.level.org.springframework.web.socket.client=DEBUG

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
